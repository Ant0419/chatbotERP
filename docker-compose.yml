services:
  # ── Base de datos ───────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app          # Hot-reload en desarrollo
      - /app/venv               # Excluir el venv local del montaje
    restart: unless-stopped

  # ── Frontend (React + Vite) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app         # Hot-reload en desarrollo
      - /app/node_modules       # Excluir node_modules local del montaje
    restart: unless-stopped

volumes:
  mongo_data:
